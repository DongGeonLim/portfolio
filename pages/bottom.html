<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Next Stage | Contact</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        /* 1. 기본 프레임 및 여백 세팅 */
        body { 
            margin: 0; color: #ffffff; background: transparent; 
            font-family: 'Pretendard', sans-serif; height: 100vh;
            box-sizing: border-box; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none;
            /* 💥 [패치 1] 브라우저단에서 가로 스크롤 및 좌우 스와이프 제스처 완전 박살내기 */
            touch-action: pan-y !important;
        }

        .teaser-container {
            text-align: center; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 20px; width: 100%; max-width: 500px;
            box-sizing: border-box; /* 💥 안전장치 추가 */
        }

        /* 🚪 상징적인 3D 미니멀 도어 오브젝트 */
        .teaser-door-object {
            width: 44px; height: 75px;
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-bottom: none; border-radius: 4px 4px 0 0;
            margin-bottom: 25px; position: relative;
            background: rgba(255, 255, 255, 0.01);
            box-shadow: 0 -10px 30px rgba(157, 78, 221, 0.25), inset 0 0 15px rgba(157, 78, 221, 0.1);
            transition: border-color 0.5s ease, box-shadow 0.5s ease;
        }
        .teaser-door-object::after {
            content: ''; position: absolute; right: 8px; top: 50%; width: 4px; height: 4px;
            background: rgba(255, 255, 255, 0.2); border-radius: 50%;
        }
        .teaser-container:hover .teaser-door-object {
            border-color: rgba(157, 78, 221, 0.6);
            box-shadow: 0 -15px 40px rgba(157, 78, 221, 0.5), inset 0 0 20px rgba(157, 78, 221, 0.2);
        }

        /* 타이포그래피 */
        .teaser-tag {
            font-size: 0.8rem; font-weight: 600; color: #9D4EDD;
            letter-spacing: 4px; text-transform: uppercase; margin-bottom: 12px; opacity: 0.8;
        }
        .teaser-title {
            font-size: 2.2rem; font-weight: 800; letter-spacing: 1px; margin: 0 0 18px 0;
            background: linear-gradient(135deg, #ffffff 30%, rgba(255,255,255,0.4));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .teaser-desc {
            font-size: 0.92rem; color: #aaa; line-height: 1.6; margin: 0 0 30px 0;
            font-weight: 400; letter-spacing: -0.2px; word-break: keep-all; max-width: 360px;
        }

        /* ✉ 2. 단일 텍스트박스 포커스 패널 */
        .contact-form-box {
            width: 100%; 
            /* 💥 [패치 2] 패딩 때문에 전체 가로폭이 400px을 초과해 삐져나가는 현상 완벽 차단 */
            max-width: calc(100% - 40px); 
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px; padding: 16px;
            box-sizing: border-box;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            display: flex; flex-direction: column; gap: 12px;
            touch-action: none;
        }
        .contact-form-box:focus-within {
            border-color: rgba(157, 78, 221, 0.5);
            box-shadow: 0 0 20px rgba(157, 78, 221, 0.15);
        }

        .message-textarea {
            width: 100%; 
            height: 140px; 
            background: transparent; border: none; outline: none;
            color: #ffffff; font-family: 'Pretendard', sans-serif; font-size: 0.9rem;
            line-height: 1.6; resize: none; box-sizing: border-box;
            padding-bottom: 8px;
            -webkit-user-select: text; user-select: text;
        }
        .message-textarea::placeholder { color: #444; font-size: 0.88rem; }

        /* 밑부분을 꽉 채우기 위해 여백과 경계선을 걷어낸 하단 로우 */
        .form-bottom-row {
            display: flex; 
            width: 100%;
            margin-top: 5px;
        }

        /* 레터 박스 가로폭을 100% 꽉 채우는 대형 와이드 전송 버튼 */
        .submit-btn-rect {
            width: 100%; 
            background: #9D4EDD; color: #ffffff; border: none; outline: none;
            padding: 0 20px; 
            border-radius: 6px; 
            font-size: 0.88rem; font-weight: 600;
            cursor: pointer; 
            display: flex; align-items: center; justify-content: center; 
            gap: 8px;
            transition: background 0.2s ease, transform 0.1s ease;
            height: 40px; 
            box-sizing: border-box;
        }
        .submit-btn-rect:hover { background: #7B1B7E; }
        .submit-btn-rect:active { transform: scale(0.99); }

        @media (max-width: 768px) {
            .teaser-title { font-size: 1.8rem; }
            .teaser-desc { font-size: 0.85rem; max-width: 300px; margin-bottom: 20px; }
            .contact-form-box { max-width: 340px; padding: 12px; }
            .message-textarea { height: 110px; } 
        }
    </style>
</head>

<body 
  onmousedown="if(!checkIframeTarget(event)) parent.handleIframeStart(event, window)"
  onmousemove="if(!checkIframeTarget(event)) parent.handleIframeMove(event, window)"
  onmouseup="if(!checkIframeTarget(event)) parent.handleIframeEnd(event, window)"
  ontouchstart="if(!checkIframeTarget(event)) parent.handleIframeStart(event, window)"
  ontouchmove="if(!checkIframeTarget(event)) parent.handleIframeMove(event, window)"
  ontouchend="if(!checkIframeTarget(event)) parent.handleIframeEnd(event, window)">

    <div class="teaser-container">
        <div class="teaser-door-object"></div>
        
        <div class="teaser-tag">저 준비 됐어요</div>
        <h1 class="teaser-title">READY TO BUILD</h1>
        <p class="teaser-desc">
            스토리 창작 역량과 실시간 제어 하드웨어 스택이 결합된 세상에 없던 차세대 몰입형 오프라인 콘텐츠가 곧 시작됩니다.
        </p>

        <form class="contact-form-box" id="mail-form" onsubmit="sendProposalMail(event)">
            <textarea id="user-message" class="message-textarea" placeholder="제안이나 피드백을 자유롭게 적어주세요. 회신을 원하시면 메일 주소나 연락처를 본문에 함께 남겨주시면 감사하겠습니다." required></textarea>
            
            <div class="form-bottom-row">
                <button type="submit" class="submit-btn-rect" id="send-btn">
                    <span>제안서 보내기</span> <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </form>
        
        <div class="status-msg" id="status-text"></div>
    </div>

    <script>
        (function() {
            emailjs.init("fzvAspX_w5FwxNzsu"); 
        })();

        // 폼 콤포넌트 영역 내부의 터치는 부모 큐브의 좌우 슬라이드 함수로 절대 흘러가지 않게 막는 특수 차단기
        function checkIframeTarget(e) {
            // 터치된 타깃 엘리먼트와 그 상위 부모 노드들을 싹 추적
            let target = e.target;
            while (target && target.tagName !== 'BODY') {
                // 유저가 폼 박스 내부(텍스트 영역, 빈공간, 버튼 등)를 터치 중이라면 true 반환해서 드래그 무력화
                if (target.classList.contains('contact-form-box')) {
                    return true;
                }
                target = target.parentNode;
            }
            return false;
        }

        function sendProposalMail(e) {
            e.preventDefault();
            
            const msgInput = document.getElementById('user-message');
            const sendBtn = document.getElementById('send-btn');
            const statusText = document.getElementById('status-text');
            
            sendBtn.disabled = true;
            statusText.style.color = '#9D4EDD';
            statusText.innerText = "제안서를 전송하는 중...";

            const templateParams = {
                from_email: "Visitor",
                message: `${msgInput.value}`
            };

            emailjs.send('service_ut05z6r', 'template_m716jrj', templateParams)
                .then(function() {
                    statusText.style.color = '#4A8FD7';
                    statusText.innerText = "✔ 제안서 전송 완료!";
                    msgInput.value = ""; 
                    sendBtn.disabled = false;
                }, function(error) {
                    console.log('Failed...', error);
                    statusText.style.color = '#ff4d4d';
                    statusText.innerText = "연동 키 세팅 후 정상 메일함으로 전송됩니다.";
                    sendBtn.disabled = false;
                });
        }
    </script>

</body>
</html>
