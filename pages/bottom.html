<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Next Stage | Contact</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- 실시간 이메일 전송을 위한 외장 라이브러리 탑재 -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        /* 1. 기본 프레임 및 여백 세팅 */
        body { 
            margin: 0; color: #ffffff; background: transparent; 
            font-family: 'Pretendard', sans-serif; height: 100vh;
            box-sizing: border-box; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none;
        }

        .teaser-container {
            text-align: center; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 20px; width: 100%; max-width: 500px;
        }

        /* 🚪 상징적인 3D 미니멀 도어 오브젝트 */
        .teaser-door-object {
            width: 44px; height: 75px;
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-bottom: none; border-radius: 4px 4px 0 0;
            margin-bottom: 25px; position: relative;
            background: rgba(255, 255, 255, 0.01);
            box-shadow: 0 -10px 30px rgba(157, 78, 221, 0.25), inset 0 0 15px rgba(157, 78, 221, 0.1);
            transition: border-color 0.5s ease, box-shadow 0.5s ease;
        }
        .teaser-door-object::after {
            content: ''; position: absolute; right: 8px; top: 50%; width: 4px; height: 4px;
            background: rgba(255, 255, 255, 0.2); border-radius: 50%;
        }
        .teaser-container:hover .teaser-door-object {
            border-color: rgba(157, 78, 221, 0.6);
            box-shadow: 0 -15px 40px rgba(157, 78, 221, 0.5), inset 0 0 20px rgba(157, 78, 221, 0.2);
        }

        /* 타이포그래피 */
        .teaser-tag {
            font-size: 0.8rem; font-weight: 600; color: #9D4EDD;
            letter-spacing: 4px; text-transform: uppercase; margin-bottom: 12px; opacity: 0.8;
        }
        .teaser-title {
            font-size: 2.2rem; font-weight: 800; letter-spacing: 1px; margin: 0 0 18px 0;
            background: linear-gradient(135deg, #ffffff 30%, rgba(255,255,255,0.4));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .teaser-desc {
            font-size: 0.92rem; color: #aaa; line-height: 1.6; margin: 0 0 30px 0;
            font-weight: 400; letter-spacing: -0.2px; word-break: keep-all; max-width: 360px;
        }

        /* ✉ 2. [디자인 경량화] 단일 텍스트박스 포커스 패널 */
        .contact-form-box {
            width: 100%; max-width: 400px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px; padding: 16px;
            box-sizing: border-box;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            display: flex; flex-direction: column; gap: 12px;
        }
        .contact-form-box:focus-within {
            border-color: rgba(157, 78, 221, 0.5);
            box-shadow: 0 0 20px rgba(157, 78, 221, 0.15);
        }

        .message-textarea {
            width: 100%; 
            height: 140px; /* 100px -> 140px로 가독 영역 대폭 확장 */
            background: transparent; border: none; outline: none;
            color: #ffffff; font-family: 'Pretendard', sans-serif; font-size: 0.9rem;
            line-height: 1.6; resize: none; box-sizing: border-box;
            padding-bottom: 8px;
            -webkit-user-select: text; user-select: text;
        }
        .message-textarea::placeholder { color: #444; font-size: 0.88rem; }

        /* [수정] 밑부분을 꽉 채우기 위해 여백과 경계선을 걷어낸 하단 로우 */
        .form-bottom-row {
            display: flex; 
            width: 100%;
            margin-top: 5px;
        }

        /* [수정] 레터 박스 가로폭을 100% 꽉 채우는 대형 와이드 전송 버튼 */
        .submit-btn-rect {
            width: 100%; /* 너비 꽉 채우기 */
            background: #9D4EDD; color: #ffffff; border: none; outline: none;
            padding: 0 20px; 
            border-radius: 6px; /* 박스 하단 라운딩과 어우러지도록 단정하게 마감 */
            font-size: 0.88rem; font-weight: 600;
            cursor: pointer; 
            display: flex; align-items: center; justify-content: center; /* 중앙 정렬 */
            gap: 8px;
            transition: background 0.2s ease, transform 0.1s ease;
            height: 40px; /* 버튼 높이도 살짝 키워 묵직함 부여 */
            box-sizing: border-box;
        }
        .submit-btn-rect:hover { background: #7B1B7E; }
        .submit-btn-rect:active { transform: scale(0.99); }

        @media (max-width: 768px) {
            .teaser-title { font-size: 1.8rem; }
            .teaser-desc { font-size: 0.85rem; max-width: 300px; margin-bottom: 20px; }
            .contact-form-box { max-width: 340px; padding: 12px; }
            .message-textarea { height: 110px; } /* 모바일에서도 균형 잡히게 조율 */
        }
    </style>
</head>

<!-- 드래그 차단 방어막 필터링 탑재 -->
<body 
  onmousedown="if(event.target.tagName !== 'TEXTAREA') parent.handleIframeStart(event, window)"
  onmousemove="if(event.target.tagName !== 'TEXTAREA') parent.handleIframeMove(event, window)"
  onmouseup="if(event.target.tagName !== 'TEXTAREA') parent.handleIframeEnd(event, window)"
  ontouchstart="if(event.target.tagName !== 'TEXTAREA') parent.handleIframeStart(event, window)"
  ontouchmove="if(event.target.tagName !== 'TEXTAREA') parent.handleIframeMove(event, window)"
  ontouchend="if(event.target.tagName !== 'TEXTAREA') parent.handleIframeEnd(event, window)">

    <div class="teaser-container">
        <div class="teaser-door-object"></div>
        
        <div class="teaser-tag">저 준비 됐어요</div>
        <h1 class="teaser-title">READY TO BUILD</h1>
        <p class="teaser-desc">
            스토리 창작 역량과 실시간 제어 하드웨어 스택이 결합된 세상에 없던 차세대 몰입형 오프라인 콘텐츠가 곧 시작됩니다.
        </p>

        <!-- 📥 [간소화 완성] 오직 단 하나의 대형 텍스트 레터 박스 -->
        <form class="contact-form-box" id="mail-form" onsubmit="sendProposalMail(event)">
            <!-- 💥 동건님의 요청대로 플레이스홀더 가이드를 직관적으로 변경했습니다. -->
            <textarea id="user-message" class="message-textarea" placeholder="제안이나 피드백을 자유롭게 적어주세요. 회신을 원하시면 메일 주소나 연락처를 본문에 함께 남겨주시면 감사하겠습니다." required></textarea>
            
            <div class="form-bottom-row">
                <button type="submit" class="submit-btn-rect" id="send-btn">
                    <span>제안서 보내기</span> <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </form>
        
        <div class="status-msg" id="status-text"></div>
    </div>

    <!-- 다이렉트 메일 포워딩 엔진 -->
    <script>
        (function() {
            emailjs.init("YOUR_PUBLIC_KEY"); 
        })();

        function sendProposalMail(e) {
            e.preventDefault();
            
            const msgInput = document.getElementById('user-message');
            const sendBtn = document.getElementById('send-btn');
            const statusText = document.getElementById('status-text');
            
            sendBtn.disabled = true;
            statusText.style.color = '#9D4EDD';
            statusText.innerText = "제안서를 전송하는 중...";

            // 기업 메일 인풋을 제외하고 본문 하나로만 데이터를 정제하여 포워딩
            const templateParams = {
                from_email: "Portfolio Visitor",
                message: `동건님 포트폴리오 바텀 페이지 제안서 발송:\n\n${msgInput.value}`
            };

            emailjs.send('YOUR_SERVICE_ID', 'YOUR_TEMPLATE_ID', templateParams)
                .then(function() {
                    statusText.style.color = '#4A8FD7';
                    statusText.innerText = "✔ 제안서 전송 완료! 곧 동건님이 응답합니다.";
                    msgInput.value = ""; 
                    sendBtn.disabled = false;
                }, function(error) {
                    console.log('Failed...', error);
                    statusText.style.color = '#ff4d4d';
                    statusText.innerText = "연동 키 세팅 후 정상 메일함으로 전송됩니다.";
                    sendBtn.disabled = false;
                });
        }
    </script>

</body>
</html>
